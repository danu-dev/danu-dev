name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Berjalan otomatis setiap tengah malam
  workflow_dispatch:      # Memungkinkan kamu menjalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Langkah Penting: Checkout repositori agar workflow bisa mengakses file
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Membuat file SVG ular berdasarkan kontribusi GitHub
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: danu-dev
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Mengirim hasilnya ke branch bernama 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
